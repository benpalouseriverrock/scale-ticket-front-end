<div class="ticket-list-wrapper">
  <h2>Scale Tickets</h2>

  <div *ngIf="loading" class="alert alert-info">Loading...</div>

  <div class="table-responsive" *ngIf="!loading">
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Ticket #</th>
          <th>Customer</th>
          <th>Product</th>
          <th>Gross Weight</th>
          <th>Net Weight</th>
          <th>Total</th>
          <th>Date</th>
          <th>WSDOT</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let ticket of tickets">
          <td>{{ ticket.ticket_number }}</td>
          <td>{{ ticket.customer_name }}</td>
          <td>{{ ticket.product_name }}</td>
          <td>{{ ticket.gross_weight }}</td>
          <td>{{ ticket.net_tons }}</td>
          <td>${{ ticket.total }}</td>
          <td>{{ ticket.date_time | date }}</td>
          <td class="text-center">
            <span *ngIf="ticket.is_wsdot_ticket" class="badge bg-info text-dark">WSDOT</span>
          </td>
          <td class="actions-cell">
            <button (click)="printTicket(ticket.ticket_id, 'ticket')" class="btn btn-sm btn-outline-primary" title="Print weights only (no costs)">Print Ticket</button>
            <button (click)="printTicket(ticket.ticket_id, 'invoice')" class="btn btn-sm btn-primary" title="Print with full costs">Print Invoice</button>
            <button (click)="editTicket(ticket)" class="btn btn-sm btn-warning">Edit</button>
            <button *ngIf="ticket.is_wsdot_ticket" (click)="pushToHaulHub(ticket.ticket_id)"
                    class="btn btn-sm btn-warning"
                    [title]="ticket.haulhub_pushed_at ? 'Re-push to HaulHub (last pushed: ' + (ticket.haulhub_pushed_at | date:'short') + ')' : 'Push to HaulHub'">
              <i class="fas fa-cloud-upload-alt"></i> HaulHub
            </button>
            <button (click)="deleteTicket(ticket.ticket_id)" class="btn btn-sm btn-danger">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
